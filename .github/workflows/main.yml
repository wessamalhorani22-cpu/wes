name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        # تم إضافة libltdl-dev لتوفير الماكرو المفقود LT_SYS_SYMBOL_USCORE
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool libtool-bin libltdl-dev m4 pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev libtinfo6

    - name: Initialize libtool
      run: |
        libtoolize --install --copy --force || true
        for dir in $(find . -name "configure.ac" -type f | xargs dirname); do
          echo "Running autoreconf in $dir"
          cd "$dir"
          autoreconf --install --force || true
          cd - > /dev/null
        done

    - name: Install Buildozer
      run: pip3 install --upgrade buildozer cython virtualenv

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
      env:
        ANDROID_HOME: /opt/android/sdk 

    - name: Build with Buildozer
      run: buildozer -vv android debug
