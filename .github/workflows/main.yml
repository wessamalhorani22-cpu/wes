name: Build APK
on: [push]

jobs:
  build:
    # استخدام نسخة 22.04 لأنها الأكثر استقراراً مع أدوات بناء بايثون
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build APK (Auto-accept licenses)
        run: |
          # أمر 'yes' يرسل حرف الموافقة (y) تلقائياً لأي نافذة ترخيص تظهر
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
